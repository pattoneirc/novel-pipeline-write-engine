<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} — 小说写作工作台</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="app-bar">
        <div class="app-bar__title">
            <a href="/" class="app-bar__logo">📖 小说写作工作台</a>
        </div>
        <nav class="app-bar__nav">
            <a href="/" class="nav-link {% if active_page == 'home' %}nav-link--active{% endif %}">首页</a>
            <a href="/write" class="nav-link {% if active_page == 'write' %}nav-link--active{% endif %}">写作</a>
            <a href="/library" class="nav-link {% if active_page == 'library' %}nav-link--active{% endif %}">书库</a>
            <a href="/review" class="nav-link {% if active_page == 'review' %}nav-link--active{% endif %}">审阅</a>
            <a href="/rag" class="nav-link {% if active_page == 'rag' %}nav-link--active{% endif %}">检索</a>
            <a href="/settings" class="nav-link {% if active_page == 'settings' %}nav-link--active{% endif %}">设置</a>
        </nav>
    </header>
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    <footer class="app-footer">
        <span>Novel Pipeline Write Engine v0.5.0</span>
    </footer>
</body>
</html>
